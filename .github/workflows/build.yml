name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86
            os: windows-latest
            cmake_args: -A Win32
            artifact: FadeStripper-windows-x86
            ext: zip

          - name: Windows x64
            os: windows-latest
            cmake_args: -A x64
            artifact: FadeStripper-windows-x64
            ext: zip

          - name: Linux x64
            os: ubuntu-22.04
            cmake_args: ""
            artifact: FadeStripper-linux-x64
            ext: tar.gz

          - name: macOS ARM64
            os: macos-latest
            cmake_args: ""
            artifact: FadeStripper-macos-arm64
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependencies
        shell: bash
        run: |
          if   [ "$RUNNER_OS" = "Linux" ]; then sudo apt-get update -qq && sudo apt-get install -y libfmt-dev
          elif [ "$RUNNER_OS" = "macOS" ]; then brew install fmt
          fi

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release --prefix dist

      - name: Package
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "${{ matrix.artifact }}.zip" ./dist/FadeStripper.exe
          else
            strip dist/FadeStripper
            tar -czf "${{ matrix.artifact }}.tar.gz" -C dist FadeStripper
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: FadeStripper ${{ github.ref_name }}
          draft: false
          make_latest: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz